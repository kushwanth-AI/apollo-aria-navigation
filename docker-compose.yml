services:
  backend:
    image: hospital-indoor-navigation-backend:latest
    build:
      context: ./backend
    container_name: hospital-navigation-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: hospital-indoor-navigation-frontend:latest
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: hospital-navigation-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
