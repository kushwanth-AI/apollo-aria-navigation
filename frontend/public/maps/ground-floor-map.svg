<svg xmlns="http://www.w3.org/2000/svg" width="900" height="640" viewBox="0 0 900 640">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#102033" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="pageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fcff"/>
      <stop offset="1" stop-color="#eef7ff"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6fbff"/>
      <stop offset="1" stop-color="#eaf5ff"/>
    </linearGradient>
    <linearGradient id="cardGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2fff8"/>
      <stop offset="1" stop-color="#def8ec"/>
    </linearGradient>
    <linearGradient id="cardYellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff9e8"/>
      <stop offset="1" stop-color="#fff1c8"/>
    </linearGradient>
    <linearGradient id="cardPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf6ff"/>
      <stop offset="1" stop-color="#f0e3ff"/>
    </linearGradient>
    <linearGradient id="cardRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7f7"/>
      <stop offset="1" stop-color="#ffe2e2"/>
    </linearGradient>
    <style>
      .title{font:700 18px Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}
      .status{font:700 12px Inter,Segoe UI,Arial,sans-serif;fill:#0b63ce}
      .room-title{font:800 16px Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}
      .room-sub{font:500 10.5px Inter,Segoe UI,Arial,sans-serif;fill:#102033}
      .entrance-title{font:800 13px Inter,Segoe UI,Arial,sans-serif;fill:#07523f}
      .entrance-sub{font:500 10px Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}
      .legend{font:500 10px Inter,Segoe UI,Arial,sans-serif;fill:#17324d}
      .point{fill:#334155}
    </style>
  </defs>

  <rect width="900" height="640" rx="8" fill="url(#pageBg)"/>
  <text x="22" y="34" class="title">Ground Floor - Live Navigation</text>
  <circle cx="26" cy="52" r="4" fill="#0b77e3"/>
  <text x="36" y="57" class="status">You are here: Moving on route</text>

  <rect x="18" y="64" width="864" height="520" rx="10" fill="#fff" stroke="#34465f" stroke-width="2.5" filter="url(#softShadow)"/>

  <path d="M450 96 L450 560" stroke="#dcebf4" stroke-width="42" stroke-linecap="round"/>
  <path d="M330 320 L600 320" stroke="#dcebf4" stroke-width="42" stroke-linecap="round"/>
  <path d="M330 320 L330 430 Q326 498 315 560" stroke="#dcebf4" stroke-width="42" stroke-linecap="round" fill="none"/>
  <path d="M600 180 Q600 170 618 170 L600 170 L600 558" stroke="#dcebf4" stroke-width="42" stroke-linecap="round" fill="none"/>
  <path d="M450 96 L450 560" stroke="#fff" stroke-width="2.5" stroke-dasharray="10 10" stroke-linecap="round"/>
  <path d="M330 320 L600 320" stroke="#fff" stroke-width="2.5" stroke-dasharray="10 10" stroke-linecap="round"/>

  <g filter="url(#softShadow)">
    <rect x="70" y="102" width="115" height="62" rx="4" fill="url(#cardBlue)" stroke="#c9d7e6"/>
    <text x="112" y="132" text-anchor="middle" class="room-title">SEC</text>
    <text x="112" y="152" text-anchor="middle" class="room-sub">Security Desk</text>
    <rect x="195" y="102" width="115" height="62" rx="4" fill="url(#cardBlue)" stroke="#c9d7e6"/>
    <text x="252" y="132" text-anchor="middle" class="room-title">INFO</text>
    <text x="252" y="152" text-anchor="middle" class="room-sub">Information Desk</text>
    <rect x="70" y="174" width="115" height="62" rx="4" fill="#f7f2ff" stroke="#d8ccea"/>
    <text x="112" y="204" text-anchor="middle" class="room-title">NURSE</text>
    <text x="112" y="224" text-anchor="middle" class="room-sub">Nurse Station</text>
    <rect x="195" y="174" width="115" height="62" rx="4" fill="#fff6e8" stroke="#e4d6c2"/>
    <text x="252" y="204" text-anchor="middle" class="room-title">TOILET</text>
    <text x="252" y="224" text-anchor="middle" class="room-sub">Restrooms</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="75" y="250" width="230" height="105" rx="4" fill="#eaf7ff" stroke="#c9d7e6"/>
    <text x="112" y="298" class="room-title">REC</text>
    <text x="112" y="320" class="room-sub">Reception</text>
    <rect x="75" y="405" width="230" height="88" rx="4" fill="url(#cardGreen)" stroke="#c9d7e6"/>
    <text x="112" y="451" class="room-title">PH</text>
    <text x="112" y="473" class="room-sub">Pharmacy</text>
    <rect x="62" y="525" width="243" height="54" rx="4" fill="url(#cardRed)" stroke="#e6c9c9"/>
    <text x="100" y="557" class="room-title">EXIT</text>
    <text x="100" y="577" class="room-sub">Exit</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="395" y="68" width="150" height="48" rx="4" fill="url(#cardGreen)" stroke="#b8d8d3"/>
    <circle cx="418" cy="92" r="12" fill="#0f766e"/>
    <text x="418" y="98" font-family="Arial" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">N</text>
    <text x="440" y="88" class="entrance-title">NORTH ENTRANCE</text>
    <text x="440" y="107" class="entrance-sub">North Entrance</text>
    <rect x="405" y="252" width="90" height="50" rx="4" fill="#eef6ff" stroke="#c9d7e6"/>
    <text x="445" y="282" text-anchor="middle" class="room-title">LIFT</text>
    <text x="445" y="300" text-anchor="middle" class="room-sub">Lift</text>
    <rect x="405" y="337" width="90" height="50" rx="4" fill="url(#cardPurple)" stroke="#d8ccea"/>
    <text x="450" y="367" text-anchor="middle" class="room-title">STAIRS</text>
    <text x="450" y="385" text-anchor="middle" class="room-sub">Stairs</text>
    <rect x="395" y="562" width="150" height="48" rx="4" fill="url(#cardGreen)" stroke="#b8d8d3"/>
    <circle cx="418" cy="586" r="12" fill="#0f766e"/>
    <text x="418" y="592" font-family="Arial" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">S</text>
    <text x="440" y="582" class="entrance-title">SOUTH ENTRANCE</text>
    <text x="440" y="601" class="entrance-sub">South Entrance</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="600" y="102" width="185" height="65" rx="4" fill="#f6fbff" stroke="#c9d7e6"/>
    <text x="632" y="135" class="room-title">OPD-1</text>
    <text x="632" y="156" class="room-sub">General OPD 1</text>
    <rect x="600" y="217" width="185" height="75" rx="4" fill="url(#cardGreen)" stroke="#b8d8d3"/>
    <text x="632" y="252" class="room-title">OPD-2</text>
    <text x="632" y="274" class="room-sub">General OPD 2</text>
    <rect x="600" y="350" width="185" height="75" rx="4" fill="url(#cardYellow)" stroke="#e4d6a8"/>
    <text x="632" y="389" class="room-title">LAB</text>
    <text x="632" y="411" class="room-sub">Sample Collection Lab</text>
    <rect x="600" y="445" width="185" height="48" rx="4" fill="#f6fbff" stroke="#c9d7e6"/>
    <text x="632" y="475" class="room-title">BILL</text>
    <text x="632" y="493" class="room-sub">Billing Counter</text>
    <rect x="600" y="505" width="185" height="46" rx="4" fill="#fff6e8" stroke="#e4d6c2"/>
    <text x="632" y="534" class="room-title">WAIT</text>
    <text x="632" y="552" class="room-sub">Patient Waiting Area</text>
    <rect x="600" y="558" width="185" height="42" rx="4" fill="url(#cardPurple)" stroke="#d8ccea"/>
    <text x="632" y="585" class="room-title">XRAY</text>
    <text x="632" y="603" class="room-sub">Radiology / X-Ray</text>
  </g>

  <circle class="point" cx="190" cy="142" r="4"/>
  <circle class="point" cx="245" cy="164" r="4"/>
  <circle class="point" cx="190" cy="204" r="4"/>
  <circle class="point" cx="245" cy="236" r="4"/>
  <circle class="point" cx="330" cy="430" r="4"/>
  <circle class="point" cx="315" cy="560" r="4"/>
  <circle class="point" cx="600" cy="180" r="4"/>
  <circle class="point" cx="600" cy="285" r="4"/>
  <circle class="point" cx="600" cy="400" r="4"/>
  <circle class="point" cx="600" cy="495" r="4"/>
  <circle class="point" cx="600" cy="540" r="4"/>
  <circle class="point" cx="600" cy="585" r="4"/>

  <g filter="url(#softShadow)">
    <rect x="295" y="596" width="310" height="32" rx="7" fill="#fff" stroke="#d5e1ea"/>
    <circle cx="318" cy="612" r="6" fill="#fff" stroke="#0b77e3" stroke-width="3"/>
    <text x="334" y="616" class="legend">You are here</text>
    <path d="M422 612 H447" stroke="#0b77e3" stroke-width="4" stroke-linecap="round"/>
    <path d="M447 612 l-8 -6 v12 z" fill="#0b77e3"/>
    <text x="465" y="616" class="legend">Route Path</text>
    <circle cx="556" cy="612" r="4" fill="#334155"/>
    <text x="571" y="616" class="legend">Room / Point</text>
  </g>
</svg>
